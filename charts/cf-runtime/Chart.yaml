apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.0.5
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "true"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: changed
      description: 'Update "codefresh-cli" to 1.0.6.'
    - kind: security
      description: 'Fix various security vulnerabilities in codefresh-cli.'
    - kind: changed
      description: 'Update "dind-volume-provisioner" to 2.0.2.'
    - kind: security
      description: 'Fix various security vulnerabilities in dind-volume-provisioner.'
    - kind: changed
      description: 'Update "cf-app-proxy" to 0.0.63.'
    - kind: security
      description: 'Fix various security vulnerabilities in cf-app-proxy.'
    - kind: changed
      description: 'Update "cf-k8s-agent" to 1.3.32.'
    - kind: security
      description: 'Fix various security vulnerabilities in cf-k8s-agent.'
    - kind: changed
      description: 'Update "engine" to 3.2.2.'
    - kind: security
      description: 'Fix various security vulnerabilities in engine.'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
