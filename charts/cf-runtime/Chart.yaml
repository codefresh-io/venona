apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.1.0
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "true"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: changed
      description: 'update "cf-deploy-kubernetes" to 18.0.0'
    - kind: added
      description: "Support k8s 1.33, 1.33, 1.35 in \"deploy\" step."
    - kind: deprecated
      description: "Remove support for k8s older than 1.33 in \"deploy\" step."
      links:
        - name: Codefresh Docs - Deploy
          url: https://codefresh.io/docs/docs/pipelines/steps/deploy/
    - kind: changed
      description: 'update "dind-volume-utils" to 1.30.8'
    - kind: security
      description: 'fix various security vulnerabilities in different runtime components'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
