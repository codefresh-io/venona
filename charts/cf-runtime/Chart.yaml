apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.2.3
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "false"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: changed
      description: 'update "cf-container-logger" to version 2.0.16'
    - kind: changed
      description: 'update "engine" to version 3.2.9'
    - kind: changed
      description: 'update "cosign-image-signer" to version 3.0.6-cf.3'
    - kind: changed
      description: 'update "gcloud-builder" to version 0.5.11'
    - kind: security
      description: 'fix various security vulnerabilities in different runtime components.'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
