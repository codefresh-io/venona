apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.3.7
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "true"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: security
      description: 'Set "cf-docker-builder" to "1.6.8" tag. Security fixes.'
    - kind: security
      description: 'Set "cf-docker-pusher" to "6.0.30" tag. Security fixes.'
    - kind: security
      description: 'Set "pikolo" to "0.15.4" tag. Security fixes.'
    - kind: security
      description: 'Set "cf-cosign-image-signer" to "3.1.1-cf.1" tag. Security fixes.'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
