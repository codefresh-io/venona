apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.3.4
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "true"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: fixed
      description: 'Fix race condition, which could cause unexpected build status if "strict_fail_fast: true" flag is used.'
    - kind: security
      description: 'Fix some CVEs in "cf-docker-builder" image.'
    - kind: changed
      description: 'Update "engine" to 3.2.12.'
    - kind: changed
      description: 'Update "cf-docker-builder" to 1.6.2.'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
