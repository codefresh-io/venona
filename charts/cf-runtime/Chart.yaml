apiVersion: v2
description: A Helm chart for Codefresh Runner
name: cf-runtime
version: 10.3.2
keywords:
  - codefresh
  - runner
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/venona
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
annotations:
  # 💡 Do not forget to update this annotation:
  artifacthub.io/containsSecurityUpdates: "true"
  # Supported kinds: `added`, `changed`, `deprecated`, `removed`, `fixed`, `security`:
  artifacthub.io/changes: |
    - kind: changed
      description: 'update "cf-container-logger" to version 2.0.17'
    - kind: changed
      description: 'update "dind-volume-utils" to version 1.30.9'
    - kind: changed
      description: 'update "cf-deploy-kubernetes" to version 18.0.1'
    - kind: changed
      description: 'update "engine" to version 3.2.11'
    - kind: changed
      description: 'update "pikolo" to version 0.15.2'
    - kind: changed
      description: 'update "pikolo" to version 6.0.27'
    - kind: changed
      description: 'update "cf-docker-puller" to version 8.0.28'
    - kind: changed
      description: 'update "cf-k8s-agent" to version 1.3.36'
    - kind: changed
      description: 'update "dind-rootless" to version 3.0.16'
    - kind: security
      description: 'fix various security vulnerabilities in different runtime components.'
dependencies:
  - name: cf-common
    repository: oci://quay.io/codefresh/charts
    version: 0.21.0
