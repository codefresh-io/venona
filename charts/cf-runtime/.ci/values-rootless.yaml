volumeProvisioner:
  env:
    IS_ROOTLESS: true
  dind-lv-monitor:
    image:
      tag: 1.30.4-rootless
      digest: sha256:c98672a69810268f1ebd7b2a7ac6ff10493d3514a5a8e190bad53f3f8a76448d
    containerSecurityContext:
      runAsUser: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
    volumePermissions:
      enabled: true

runtime:
  dind:
    image:
      tag: 29.4.1-3.0.15-rootless
      digest: sha256:b740c3ded238473e0b5bded9a90650af18914db3af2fa458bbe19789bdc3ac81
    userVolumeMounts:
      dind:
        name: dind
        mountPath: /home/rootless/.local/share/docker
    containerSecurityContext:
      privileged: true
      runAsUser: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
    volumePermissions:
      enabled: true
